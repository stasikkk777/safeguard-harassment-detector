version: "3.9"

services:
  safeguard:
    build: .
    container_name: safeguard-app
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - DEBUG=false
    volumes:
      # Persist the downloaded Detoxify model checkpoint between restarts
      - model_cache:/root/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  model_cache:
